<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirish — Free UC Bot Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-wrap">
    <div class="login-card notched">
        <div class="login-mark">UC</div>
        <h1>Command Deck</h1>
        <p>Free UC Bot boshqaruv paneliga kirish</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="field">
                <label>Login</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="field">
                <label>Parol</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding: 12px;">Kirish →</button>
        </form>
    </div>
</div>
</body>
</html>
